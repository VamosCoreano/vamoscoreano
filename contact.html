<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Contacto - VAMOS COREANO</title>
 <style>
  /* 1. 이메일 복사 알림창(Toast) 스타일 유지 */
  #copy-toast {
    visibility: hidden; min-width: 200px; background-color: var(--color-text);
    color: #fff; text-align: center; border-radius: 8px; padding: 12px;
    position: fixed; z-index: 1000; left: 50%; bottom: 30px;
    transform: translateX(-50%); font-size: 14px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s, bottom 0.3s;
  }
  #copy-toast.show { visibility: visible; opacity: 1; bottom: 50px; }

  /* 2. [핵심] 버튼 태그를 링크(a)와 100% 동일하게 박제 */
  .copy-button-fix {
    /* 기존 menu-button 속성 강제 상속 및 초기화 */
    appearance: none;
    -webkit-appearance: none;
    background: #ffffff;
    cursor: pointer;
    font-family: 'Inter', sans-serif; /* 폰트 강제 지정 */
    font-size: var(--font-m);
    letter-spacing: 0.05em; /* 우리가 설정한 자간 */
    border: 1px solid #e5e7eb;
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
    padding: 16px 20px;
    text-align: center;
    text-decoration: none;
    font-weight: 600;
    border-radius: 8px;
    line-height: 1;
    transition: all 0.2s ease;
    color: var(--color-text) !important;
  }

  /* 3. 호버 스타일 이식 (style.css의 .menu-button:hover와 동일하게) */
  .copy-button-fix:hover {
    background-color: #f8fafc;
    border-color: var(--color-primary);
    color: var(--color-primary) !important;
    transform: translateY(-2px);
  }
</style>


  
</head>

<body>
  <header class="main-header">
    <div class="container nav-container">
      <a href="index.html" class="logo">VAMOS COREANO</a>
      <nav>
        <a href="about.html">SOBRE PROFE</a>
        <a href="class.html">CLASES</a>
        <a href="contact.html">CONTACTO</a>
      </nav>
    </div>
  </header>

  <main class="contact-main" style="padding-top: var(--space-m);">
    <div class="container">
      <h1 style="margin-top: 0; margin-bottom: var(--space-l); letter-spacing: -0.02em;">CONTACTO</h1>

      <div class="hero-description">
        <p class="highlight-text">¿Tienes preguntas sobre las clases?</p>
        <p class="sub-text">Escríbeme por cualquiera de estos medios y te responderé lo antes posible.</p>
      </div>

      <section class="menu-section">
  <div class="container" style="display: flex; flex-direction: column; gap: 12px; align-items: center;">
    
    <a href="https://wa.me/yournumber" class="cta-button" target="_blank" rel="noopener noreferrer">WHATSAPP</a>

<a href="https://instagram.com/vamoscoreano" class="menu-button" target="_blank" rel="noopener noreferrer">INSTAGRAM</a>
    
    <button onclick="copyEmail()" class="copy-button-fix">EMAIL</button>
  </div>
</section>
    </div>
  </main>

  <div id="copy-toast">Correo copiado al portapapeles</div>

  <footer class="footer">
    <p>© 2026 VAMOS COREANO</p>
    <p>Profesor Hyunho Lee</p>
  </footer>

  <script>
    function copyEmail() {
      const email = "1219.hlee@gmail.com";
      
      // 클립보드 복사 실행
      navigator.clipboard.writeText(email).then(() => {
        // 알림창 띄우기
        const toast = document.getElementById("copy-toast");
        toast.className = "show";
        
        // 2.5초 뒤에 알림창 숨기기
        setTimeout(function(){ 
          toast.className = toast.className.replace("show", ""); 
        }, 2500);
      });
    }
  </script>
</body>
</html>
